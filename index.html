<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
<title>ShopNest</title>
<style>
body { font-family: Arial; padding:20px; }
.product { border:1px solid #ccc; padding:10px; margin:10px; }
button { background:green; color:white; padding:5px; margin-top:5px;}
#cart { border:2px solid black; padding:10px; margin-top:20px;}
</style>
</head>
<body>

<h1>ShopNest</h1>
<div id="products"></div>

<h2>Cart</h2>
<div id="cart"></div>
<h3 id="total"></h3>

<h2>Checkout</h2>
<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>
<input id="address" placeholder="Address"><br>
<button onclick="checkout()">Place Order</button>

<script>
let cart = [];

function renderCart(){
  let div = document.getElementById("cart");
  let total = 0;
  div.innerHTML="";
  cart.forEach((item,i)=>{
    total += item.price;
    div.innerHTML += item.name + " - Rs."+item.price+"<br>";
  });
  document.getElementById("total").innerText="Total: Rs."+total;
}

fetch("http://localhost:5000/products")
.then(res=>res.json())
.then(data=>{
  const div = document.getElementById("products");
  data.forEach(p=>{
    div.innerHTML += `
      <div class="product">
        <h3>${p.name}</h3>
        <p>Rs. ${p.price}</p>
        <button onclick='addToCart(${JSON.stringify(p)})'>Add</button>
      </div>`;
  });
});

function addToCart(p){
  cart.push(p);
  renderCart();
}

function checkout(){
  const order = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value,
    items: cart
  };

  fetch("http://localhost:5000/orders",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(order)
  })
  .then(()=>alert("Order Placed"));
}
</script>

</body>
</html>
